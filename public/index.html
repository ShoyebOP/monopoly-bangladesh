<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monopoly Bangladesh - মনোপলি বাংলাদেশ</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="game-header">
    <h1>মনোপলি বাংলাদেশ</h1>
    <div class="game-info">
      <div class="turn-indicator" id="turnIndicator">
        <span class="label">বর্তমান চাল:</span>
        <span class="player-name" id="currentPlayer">Player 1</span>
      </div>
    </div>
  </header>

  <main class="game-container">
    <!-- Game Board -->
    <div class="board-container">
      <div class="board" id="board">
        <!-- Board will be generated by JavaScript -->
      </div>
    </div>

    <!-- Game Controls -->
    <div class="controls-panel">
      <div class="dice-section">
        <div class="dice-display" id="diceDisplay">
          <div class="die" id="die1">⚀</div>
          <div class="die" id="die2">⚀</div>
        </div>
        <div class="dice-result" id="diceResult"></div>
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" id="btnRoll" onclick="rollDice()">
          পাশা দিন (Roll Dice)
        </button>
        <button class="btn btn-success" id="btnBuy" onclick="buyProperty()" disabled>
          কিনুন (Buy)
        </button>
        <button class="btn btn-secondary" id="btnEndTurn" onclick="endTurn()" disabled>
          চাল শেষ করুন (End Turn)
        </button>
      </div>
    </div>

    <!-- Player Info Panel -->
    <div class="player-panel">
      <h2>খেলোয়াড় তথ্য (Player Info)</h2>
      <div class="players-list" id="playersList">
        <!-- Players will be loaded here -->
      </div>
    </div>

    <!-- Property Info Panel -->
    <div class="property-panel">
      <h2>সম্পত্তি তথ্য (Property Info)</h2>
      <div class="property-details" id="propertyDetails">
        <p class="empty-state">যেকোনো ঘরে ক্লিক করুন বিস্তারিত দেখতে</p>
      </div>
    </div>
  </main>

  <!-- Game Log -->
  <aside class="game-log" id="gameLog">
    <h3>খেলা লগ (Game Log)</h3>
    <div class="log-entries" id="logEntries">
      <div class="log-entry">খেলা শুরু হয়েছে!</div>
    </div>
  </aside>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p>লোড হচ্ছে...</p>
  </div>

  <script src="/js/game.js" type="module"></script>
</body>
</html>
