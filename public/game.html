<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monopoly Bangladesh - Game</title>
  <link rel="stylesheet" href="/css/game.css">
</head>
<body>
  <header class="game-header">
    <h1>মনোপলি বাংলাদেশ</h1>
    <div class="game-info">
      <div class="turn-indicator">
        <span>Turn:</span>
        <span id="currentPlayerName">-</span>
      </div>
      <button class="btn btn-small" id="btnLeave">Leave</button>
    </div>
  </header>

  <main class="game-container">
    <div class="board-container">
      <div class="board" id="board"></div>
    </div>

    <div class="controls-panel">
      <div class="dice-section">
        <div class="dice-display">
          <span class="die" id="die1">⚀</span>
          <span class="die" id="die2">⚀</span>
        </div>
        <div class="dice-result" id="diceResult"></div>
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" id="btnRoll" disabled>Roll</button>
        <button class="btn btn-success" id="btnBuy" disabled>Buy</button>
        <button class="btn btn-secondary" id="btnEndTurn" disabled>End Turn</button>
      </div>

      <div class="action-message" id="actionMessage">Waiting...</div>
    </div>

    <div class="player-panel">
      <h2>Players</h2>
      <div class="players-list" id="playersList"></div>
    </div>

    <div class="property-panel">
      <h2>Property</h2>
      <div class="property-details" id="propertyDetails">
        <p class="empty-state">Click a space</p>
      </div>
    </div>
  </main>

  <div class="game-log">
    <h3>Log</h3>
    <div class="log-entries" id="logEntries"></div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p>Loading...</p>
  </div>

  <script src="/js/game.js" type="module"></script>
</body>
</html>
